name: Sync Update Manifest

on:
  release:
    types:
      - published
      - edited
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-manifest:
    runs-on: ubuntu-latest
    env:
      ADDON_MODULE: nurc_boolean_core
      MANIFEST_PATH: nurc_boolean_core_update_manifest.json
      ASSET_REGEX: ^nurc_boolean_core_.*\.zip$
      CHANNEL: stable
      DEFAULT_NOTE_1: Nurc Boolean Core update channel manifest.
      DEFAULT_NOTE_2: Release manifest synchronized automatically from the latest GitHub release.
      DEFAULT_NOTE_3: Installation remains external through the exported bridge.
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate manifest from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          token = os.environ["GITHUB_TOKEN"]
          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          repository = os.environ["GITHUB_REPOSITORY"]
          addon_module = os.environ["ADDON_MODULE"]
          manifest_path = Path(os.environ["MANIFEST_PATH"])
          asset_regex = re.compile(os.environ["ASSET_REGEX"])
          channel = os.environ["CHANNEL"]
          default_notes = [
              os.environ["DEFAULT_NOTE_1"],
              os.environ["DEFAULT_NOTE_2"],
              os.environ["DEFAULT_NOTE_3"],
          ]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "nurc-manifest-sync",
          }

          def api_json(url: str) -> dict:
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          event_payload = json.loads(event_path.read_text(encoding="utf-8"))
          release_info = event_payload.get("release")
          if release_info and release_info.get("url"):
              release = api_json(release_info["url"])
          else:
              release = api_json(f"https://api.github.com/repos/{repository}/releases/latest")

          assets = list(release.get("assets") or [])
          matching_assets = [asset for asset in assets if asset_regex.match(str(asset.get("name") or ""))]
          if not matching_assets:
              available_names = [str(asset.get("name") or "") for asset in assets]
              raise SystemExit(
                  f"No release asset matched {asset_regex.pattern!r}. Available assets: {available_names}"
              )

          asset = sorted(
              matching_assets,
              key=lambda item: str(item.get("created_at") or item.get("updated_at") or ""),
              reverse=True,
          )[0]

          tag_name = str(release.get("tag_name") or "").strip()
          if not tag_name:
              raise SystemExit("Release tag_name is missing")
          version = tag_name.lstrip("vV")

          body = str(release.get("body") or "").replace("\r\n", "\n")
          notes = []
          for raw_line in body.split("\n"):
              line = raw_line.strip()
              if not line:
                  continue
              if line.startswith(("- ", "* ")):
                  line = line[2:].strip()
              notes.append(line)
          if not notes:
              notes = default_notes

          manifest = {
              "version": version,
              "addon_module": addon_module,
              "download_url": str(asset.get("browser_download_url") or ""),
              "notes": notes,
              "published_utc": str(release.get("published_at") or release.get("created_at") or ""),
              "channel": channel,
          }

          manifest_path.write_text(
              json.dumps(manifest, indent=4, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(manifest, indent=2, ensure_ascii=False))
          PY

      - name: Commit manifest if changed
        run: |
          if git diff --quiet --exit-code -- "${MANIFEST_PATH}"; then
            echo "Manifest already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${MANIFEST_PATH}"
          git commit -m "chore: sync update manifest from release"
          git push
